name: Node.js Release PR (reusable)

on:
  workflow_call:
    inputs:
      new-version:
        description: New version to release (patch, minor, major, or auto)
        required: false
        default: auto
        type: string
      reviewers:
        description: Reviewers for the pull request (comma-separated)
        required: false
        type: string

jobs:
  release-pr:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10
    concurrency: ${{ github.workflow }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # for changelog generation from commit history

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          cache: npm

      - name: Update npm to latest
        run: |
          npm install --global npm@latest
          echo "Successfully updated npm to $(npm -v)"

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: determine-version
        if: ${{ inputs.new-version == 'auto' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag=$(gh release view --json 'tagName' --jq '.tagName' 2>/dev/null || echo "")

          if [[ -z "${latest_tag}" ]]; then
            # If no releases exist, get recent commits (last 100 to avoid performance issues)
            # Include body lines to detect BREAKING CHANGE footer
            commits=$(git log --pretty=format:"%s%n%b" HEAD -n 100)
          else
            # Get commits since the latest tag (subjects + bodies)
            commits=$(git log --pretty=format:"%s%n%b" "${latest_tag}..HEAD")
          fi

          # Determine a version based on conventional commits.
          # Major: feat! (exclamation in type/scope) OR a BREAKING CHANGE footer line.
          if echo "${commits}" | grep -qE '^feat(.+)?!:|^BREAKING CHANGE:'; then
            version_type="major"
          elif echo "${commits}" | grep -qE '^feat(.+)?:'; then
            version_type="minor"
          else
            version_type="patch"
          fi

          echo "version-type=${version_type}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Auto-detected version: ${version_type}"

      - name: Bump version
        id: bump-version
        env:
          NEW_VERSION: ${{ steps.determine-version.outputs.version-type || inputs.new-version }}
        run: |
          npm version "${NEW_VERSION}" --no-git-tag-version
          echo "new-version=$(jq -r '.version' package.json)" >> "${GITHUB_OUTPUT}"

      - name: Get additional info
        id: get-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "latest-tag=$(gh release view --json tagName --jq .tagName)" >> "${GITHUB_OUTPUT}"

      - name: Create release commit
        id: create-release-commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NEW_VERSION: ${{ steps.bump-version.outputs.new-version }}
        with:
          script: |
            const fs = require("node:fs");
            const { execSync } = require("node:child_process");

            const newVersion = process.env.NEW_VERSION;
            const branchName = `release/v${newVersion}`;
            const commitMessage = `chore: release v${newVersion}`;
            const expectedHeadOid = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repositoryNameWithOwner = `${owner}/${repo}`;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/heads/${branchName}`,
              sha: expectedHeadOid,
            });
            console.log(`Created release branch: ${branchName}`);

            const diffOutput = execSync("git diff --name-status --no-renames", { encoding: "utf8" }).trim();
            const additions = [];
            const deletions = [];

            if (diffOutput.length > 0) {
              for (const line of diffOutput.split("\n")) {
                const [status, path] = line.split("\t");
                if (!status || !path) {
                  continue;
                }

                if (status === "D") {
                  deletions.push({ path });
                  continue;
                }

                additions.push({
                  path,
                  contents: fs.readFileSync(path).toString("base64"),
                });
              }
            }

            if (additions.length === 0 && deletions.length === 0) {
              throw new Error("No file changes found for release commit.");
            }

            const fileChanges = {};
            if (additions.length > 0) {
              fileChanges.additions = additions;
            }
            if (deletions.length > 0) {
              fileChanges.deletions = deletions;
            }

            const result = await github.graphql(
              `mutation CreateCommitOnBranch($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit {
                    oid
                  }
                }
              }`,
              {
                input: {
                  branch: {
                    repositoryNameWithOwner,
                    branchName,
                  },
                  message: {
                    headline: commitMessage,
                  },
                  expectedHeadOid,
                  fileChanges,
                },
              },
            );

            console.log(`Created release commit: ${result.createCommitOnBranch.commit.oid}`);
            core.setOutput("branch-name", branchName);
            core.setOutput("commit-message", commitMessage);

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.bump-version.outputs.new-version }}
          LATEST_TAG: ${{ steps.get-info.outputs.latest-tag }}
          REVIEWERS: ${{ inputs.reviewers }}
          BRANCH_NAME: ${{ steps.create-release-commit.outputs.branch-name }}
          COMMIT_MESSAGE: ${{ steps.create-release-commit.outputs.commit-message }}
        run: |
          cat <<EOF > "${RUNNER_TEMP}/pr_body.txt"
          This PR prepares the release of **v${NEW_VERSION}**.

          Changes: <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${LATEST_TAG}...${BRANCH_NAME}>

          This PR was generated by [this action run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).
          EOF

          gh pr create \
            --title "${COMMIT_MESSAGE}" \
            --body-file "${RUNNER_TEMP}/pr_body.txt" \
            --head "${BRANCH_NAME}" \
            --base "${GITHUB_REF_NAME}" \
            --reviewer "${REVIEWERS}" \
            --assignee "${GITHUB_ACTOR}"

          pr_url=$(gh pr view --json url --jq '.url')
          echo "::notice::Created pull request for releasing v${NEW_VERSION}: ${pr_url}"
