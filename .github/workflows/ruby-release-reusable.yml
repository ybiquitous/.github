name: Ruby Release (reusable)

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version
        required: false
        default: "ruby" # latest
        type: string

jobs:
  release:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 10
    concurrency: ${{ github.workflow }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      # NOTE: Directly use rubygems/configure-rubygems-credentials, instead of rubygems/release-gem, to avoid unknown errors with Trusted Publishing.
      # Ref:
      # - https://github.com/rubygems/configure-rubygems-credentials/issues/349
      # - https://guides.rubygems.org/trusted-publishing
      - name: Configure trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      - name: Set up Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Release gem
        run: bundle exec rake release

      - name: Wait for release
        run: gem exec rubygems-await pkg/*.gem

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          new_tag="$(git describe --tags --abbrev=0)"
          gh release create "${new_tag}" --verify-tag --draft

          release_url=$(gh release view "${new_tag}" --json 'url' --jq '.url')
          echo "::notice::Created the draft release: ${release_url}"
